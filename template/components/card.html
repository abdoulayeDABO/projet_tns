<div class="bg-slate-800/50 backdrop-blur border border-slate-700/50 rounded-xl p-8 hover:border-cyan-400/50 transition">
    {% if icon %}
    <div class="w-12 h-12 bg-gradient-to-r from-blue-500 to-cyan-500 rounded-lg flex items-center justify-center mb-4">
        <span class="text-xl">{{ icon }}</span>
    </div>
    {% endif %}
    <h3 class="text-xl font-bold mb-3">{{ title }}</h3>
    <p class="text-slate-300">
        {{ description }}
    </p>
    {% if link %}
    <a href="{{ link }}" class="inline-block mt-4 px-4 py-2 bg-cyan-500 hover:bg-cyan-600 rounded transition">
        Voir plus →
    </a>
    {% endif %}
</div>
