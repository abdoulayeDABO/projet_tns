<button 
    {% if onclick %}hx-get="{{ onclick }}" hx-target="#{{ target }}"{% endif %}
    class="px-8 py-3 {% if variant == 'primary' %}bg-gradient-to-r from-blue-500 to-cyan-500 hover:shadow-lg hover:shadow-blue-500/50{% elif variant == 'outline' %}border border-slate-500 hover:border-cyan-400 hover:text-cyan-400{% else %}bg-cyan-500 hover:bg-cyan-600{% endif %} rounded-lg font-semibold transition transform hover:scale-105">
    {{ text }}
</button>
