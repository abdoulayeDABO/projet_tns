<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}TNS - Traitement Numérique du Signal{% endblock %}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/htmx.org@2.0.2/dist/htmx.js"></script>
    <script src="/static/segments.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 50%, #0f0f0f 100%);
        }
        .glass-effect {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="text-white min-h-screen">
    <!-- Navigation -->
    <nav class="glass-effect sticky top-0 z-50 border-b border-slate-700/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="text-xl font-bold text-slate-100 hover:opacity-80 transition">
                    App Web de Traitement Numérique
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="min-h-screen">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="glass-effect border-t border-slate-700/50 py-8 px-4 mt-16">
        <div class="max-w-7xl mx-auto text-center text-slate-500">
            <p class="text-sm">&copy; 2026 App Web de Traitement Numérique</p>
        </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
    
    <script>
    // Initialiser le tableau au chargement
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof populateSegmentsTable === 'function') {
            populateSegmentsTable();
        }
    });

    // Mettre à jour le tableau après segmentation avec HTMX
    document.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.xhr.responseURL.includes('/api/segment-audio')) {
            setTimeout(function() {
                if (typeof populateSegmentsTable === 'function') {
                    populateSegmentsTable();
                }
            }, 500);
        }
    });
    </script>
</body>
</html>
