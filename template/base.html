<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TNS — ESP/UCAD{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script>
        (function loadChartJs() {
            const sources = [
                'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.0/chart.umd.min.js',
                'https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js',
                '{{ url_for("static", filename="vendor/chart.umd.min.js") }}'
            ];
            let index = 0;

            function tryNext() {
                if (window.Chart || index >= sources.length) {
                    return;
                }
                const script = document.createElement('script');
                script.src = sources[index++];
                script.defer = true;
                script.onload = function () {
                    document.dispatchEvent(new Event('chartjs-ready'));
                };
                script.onerror = tryNext;
                document.head.appendChild(script);
            }

            tryNext();
        })();
    </script>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% include 'components/onglets/nav.html' %}
    <main class="main-layout fade-in">
        {% block content %}{% endblock %}
    </main>
    {% include 'components/alert.html' %}
    <script src="{{ url_for('static', filename='tabs.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
